{% extends 'admin/change_form.html' %}

{% block extrahead %}
{{ block.super }}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<style>
    .test-email-section {
        background: #f8f9fa;
        padding: 15px;
        border-radius: 4px;
        margin-bottom: 20px;
    }
    .test-email-section h3 {
        margin-top: 0;
    }
    .test-email-result {
        margin-top: 10px;
    }
</style>
{% endblock %}

{% block content %}
<div class="test-email-section">
    <h3><i class="bi bi-send-check"></i> Test Email</h3>
    <p>Send a test email to verify your SMTP settings are working correctly.</p>
    <div class="input-group">
        <input type="email" class="form-control" id="test-email" placeholder="Enter email address">
        <button class="btn btn-info" type="button" id="send-test-btn">
            <i class="bi bi-send"></i> Send Test Email
        </button>
    </div>
    <div id="test-email-result" class="test-email-result"></div>
</div>

{{ block.super }}

<script>
document.getElementById('send-test-btn').addEventListener('click', function() {
    const email = document.getElementById('test-email').value;
    const resultDiv = document.getElementById('test-email-result');
    
    if (!email) {
        resultDiv.innerHTML = '<span class="text-danger">Please enter an email address</span>';
        return;
    }
    
    resultDiv.innerHTML = '<span class="text-muted">Sending...</span>';
    document.getElementById('send-test-btn').disabled = true;
    
    fetch('/admin/test-email/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded',
            'X-CSRFToken': '{{ csrf_token }}'
        },
        body: 'email=' + encodeURIComponent(email)
    })
    .then(response => response.json())
    .then(data => {
        document.getElementById('send-test-btn').disabled = false;
        if (data.success) {
            resultDiv.innerHTML = '<span class="text-success">' + data.message + '</span>';
        } else {
            resultDiv.innerHTML = '<span class="text-danger">' + data.error + '</span>';
        }
    })
    .catch(error => {
        document.getElementById('send-test-btn').disabled = false;
        resultDiv.innerHTML = '<span class="text-danger">Error: ' + error + '</span>';
    });
});
</script>
{% endblock %}
